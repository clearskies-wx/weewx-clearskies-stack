name: Release

on:
  push:
    tags: ['v*.*.*']

# NOTE (coding.md §1): Third-party actions should be SHA-pinned in production.
# actions/checkout SHA (v4): 34e114876b0b11c390a56381ad16ebd13914f8d5

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
