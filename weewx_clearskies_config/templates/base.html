<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clear Skies Configuration{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    crossorigin="anonymous"
  >
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    :root {
      --pico-font-size: 87.5%;
      --pico-line-height: 1.4;
      --pico-form-element-spacing-vertical: 0.5rem;
      --pico-form-element-spacing-horizontal: 0.75rem;
      --pico-typography-spacing-vertical: 0.75rem;
    }
    html {
      min-height: 100vh;
    }
    body {
      min-height: 100vh;
      background: url("/wizard/static/sky.jpg?v=2") no-repeat center top fixed;
      background-size: cover;
      background-color: #1a3a5c;
    }
    main.container {
      background: rgba(255, 255, 255, 0.93);
      border-radius: 0.5rem;
      padding: 2rem;
      margin-top: 3.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    }
    main.container > header {
      background: linear-gradient(135deg, #1a5276, #2980b9);
      color: #fff;
      margin: -2rem -2rem 1.5rem -2rem;
      padding: 1.5rem 2rem;
      border-radius: 0.5rem 0.5rem 0 0;
    }
    main.container > header h1 {
      color: #fff;
      margin: 0;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    @media (prefers-color-scheme: dark) {
      main.container {
        background: rgba(30, 30, 30, 0.93);
      }
      main.container > header {
        background: linear-gradient(135deg, #0d2137, #1a5276);
      }
    }
    .skip-link {
      position: absolute;
      top: -3rem;
      left: 0;
      background: var(--pico-primary);
      color: var(--pico-primary-inverse);
      padding: 0.5rem 1rem;
      z-index: 1000;
      text-decoration: none;
      border-radius: 0 0 0.25rem 0;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main class="container" id="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
