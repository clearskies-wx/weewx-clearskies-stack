{% if test_result.success %}
<div class="alert-success" role="status">
  <strong>{{ test_provider_name }}</strong>: connection successful ({{ test_result.response_time_ms }}ms)
</div>
{% else %}
<div class="alert-error" role="alert">
  <strong>{{ test_provider_name }}</strong>: {{ test_result.error }}
</div>
{% endif %}
