<div id="marine-alert-radius" style="margin-block-start:1rem;">
  <label for="marine-alert-radius-input">
    {{ _("Marine Alert Radius (miles)") }}
    <input type="number"
           id="marine-alert-radius-input"
           name="marine_alert_radius_miles"
           value="{{ state.marine_alert_radius_miles }}"
           min="0" max="100" step="1"
           aria-describedby="marine-alert-radius-help">
  </label>
  <small id="marine-alert-radius-help">{{ _("Discovers nearby NWS marine zones for coastal weather alerts like Small Craft Advisories. Set to 0 to disable.") }}</small>
</div>
