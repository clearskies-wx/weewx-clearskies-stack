<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <title>Clear Skies — Single-Host Topology</title>
  <defs>
    <marker id="arr3" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="560" height="380" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="280" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Single-Host Deployment Topology</text>

  <!-- Host box -->
  <rect x="20" y="50" width="520" height="260" rx="10" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="280" y="72" text-anchor="middle" font-weight="700" fill="#334155" font-size="14">Single host (all services)</text>

  <!-- weewx -->
  <rect x="40" y="90" width="130" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="105" y="116" text-anchor="middle" font-weight="600" fill="#92400e">weewx 5.x</text>
  <text x="105" y="134" text-anchor="middle" font-size="10" fill="#a16207">+ Loop Relay</text>

  <!-- DB -->
  <rect x="40" y="170" width="130" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="105" y="194" text-anchor="middle" font-weight="600" fill="#92400e">Archive DB</text>
  <text x="105" y="210" text-anchor="middle" font-size="10" fill="#a16207">SQLite / MariaDB</text>

  <!-- API -->
  <rect x="200" y="90" width="130" height="80" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="265" y="116" text-anchor="middle" font-weight="600" fill="#166534">API</text>
  <text x="265" y="134" text-anchor="middle" font-size="11" fill="#166534">Port 8765</text>
  <text x="265" y="150" text-anchor="middle" font-size="11" fill="#166534">Health :8081</text>

  <!-- Redis -->
  <rect x="200" y="190" width="130" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="265" y="215" text-anchor="middle" font-weight="600" fill="#991b1b">Redis :6379</text>

  <!-- Caddy -->
  <rect x="360" y="90" width="150" height="80" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="435" y="116" text-anchor="middle" font-weight="600" fill="#3730a3">Caddy</text>
  <text x="435" y="134" text-anchor="middle" font-size="11" fill="#3730a3">Ports 80 / 443</text>
  <text x="435" y="150" text-anchor="middle" font-size="11" fill="#3730a3">Dashboard files</text>

  <!-- Config UI -->
  <rect x="360" y="190" width="150" height="50" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="435" y="212" text-anchor="middle" font-weight="600" fill="#86198f">Config UI</text>
  <text x="435" y="228" text-anchor="middle" font-size="10" fill="#a21caf">Port 9876</text>

  <!-- Arrows -->
  <line x1="105" y1="150" x2="105" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="170" y1="120" x2="198" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="184" y="113" font-size="9" fill="#64748b">socket</text>
  <line x1="200" y1="155" x2="155" y2="175" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr3)"/>
  <text x="162" y="161" font-size="9" fill="#64748b">SQL</text>
  <line x1="265" y1="170" x2="265" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="330" y1="130" x2="358" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="344" y="123" font-size="9" fill="#64748b">proxy</text>
  <line x1="435" y1="170" x2="435" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Internet -->
  <rect x="370" y="280" width="140" height="50" rx="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="440" y="303" text-anchor="middle" font-weight="600" fill="#475569">Internet</text>
  <text x="440" y="319" text-anchor="middle" font-size="10" fill="#64748b">Visitors</text>

  <line x1="435" y1="280" x2="435" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="444" y="262" font-size="10" fill="#64748b">HTTPS</text>

  <text x="40" y="360" font-size="10" fill="#64748b">All services share one machine alongside weewx</text>
</svg>
