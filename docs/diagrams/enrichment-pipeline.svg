<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>Clear Skies — Enrichment Pipeline</title>
  <defs>
    <marker id="a5" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="700" height="360" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Enrichment Pipeline</text>

  <!-- Raw data input -->
  <rect x="20" y="60" width="120" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" font-weight="600" fill="#92400e">Raw Data</text>
  <text x="80" y="97" text-anchor="middle" font-size="10" fill="#a16207">Loop packets</text>
  <text x="80" y="109" text-anchor="middle" font-size="10" fill="#a16207">Archive records</text>

  <!-- Arrow -->
  <line x1="140" y1="88" x2="168" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Unit Conversion -->
  <rect x="170" y="55" width="120" height="65" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="77" text-anchor="middle" font-weight="600" fill="#1e40af">Unit</text>
  <text x="230" y="93" text-anchor="middle" font-weight="600" fill="#1e40af">Conversion</text>
  <text x="230" y="110" text-anchor="middle" font-size="10" fill="#2563eb">source → display</text>

  <!-- Arrow -->
  <line x1="290" y1="88" x2="318" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Derived Values -->
  <rect x="320" y="50" width="160" height="75" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" font-weight="600" fill="#166534">Derived Values</text>
  <text x="400" y="88" text-anchor="middle" font-size="10" fill="#15803d">Beaufort scale</text>
  <text x="400" y="101" text-anchor="middle" font-size="10" fill="#15803d">Comfort index</text>
  <text x="400" y="114" text-anchor="middle" font-size="10" fill="#15803d">Barometer trend</text>

  <!-- Arrow -->
  <line x1="480" y1="88" x2="508" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Labels + Formatting -->
  <rect x="510" y="55" width="120" height="65" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="570" y="77" text-anchor="middle" font-weight="600" fill="#3730a3">Labels +</text>
  <text x="570" y="93" text-anchor="middle" font-weight="600" fill="#3730a3">Formatting</text>
  <text x="570" y="110" text-anchor="middle" font-size="10" fill="#4338ca">locale-aware</text>

  <!-- Arrow to output -->
  <line x1="630" y1="88" x2="658" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- API Response -->
  <rect x="650" y="55" width="35" height="65" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="667" y="82" text-anchor="middle" font-weight="600" fill="#134e4a" transform="rotate(90,667,92)" font-size="11">JSON</text>

  <!-- Sky Classification (parallel) -->
  <rect x="170" y="155" width="310" height="70" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="325" y="177" text-anchor="middle" font-weight="600" fill="#86198f">Sky Classification Engine</text>
  <text x="325" y="193" text-anchor="middle" font-size="10" fill="#a21caf">30-min rolling buffer → Kv/Km indices → dynamic thresholds</text>
  <text x="325" y="207" text-anchor="middle" font-size="10" fill="#a21caf">→ Clear / Partly Cloudy / Overcast / … (7 labels)</text>

  <!-- Arrow from sky to weather text -->
  <line x1="325" y1="225" x2="325" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Weather Text Composition -->
  <rect x="170" y="257" width="310" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="325" y="279" text-anchor="middle" font-weight="600" fill="#991b1b">Weather Text Composition</text>
  <text x="325" y="297" text-anchor="middle" font-size="10" fill="#b91c1c">"Warm and Humid, Partly Cloudy, with Light Rain"</text>

  <!-- Arrow from weather text to output -->
  <line x1="480" y1="285" x2="570" y2="122" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a5)"/>

  <!-- Haze detection -->
  <rect x="510" y="180" width="160" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="202" text-anchor="middle" font-weight="600" fill="#92400e">Haze Detection</text>
  <text x="590" y="218" text-anchor="middle" font-size="10" fill="#a16207">Kcs deficit + PM confirm</text>

  <!-- Arrow from haze to weather text -->
  <line x1="550" y1="235" x2="460" y2="265" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a5)"/>

  <!-- Input smoother annotation -->
  <rect x="20" y="155" width="120" height="55" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="80" y="177" text-anchor="middle" font-weight="600" fill="#64748b">Input Smoother</text>
  <text x="80" y="193" text-anchor="middle" font-size="10" fill="#94a3b8">2-30 min windows</text>
  <text x="80" y="206" text-anchor="middle" font-size="10" fill="#94a3b8">per field type</text>

  <line x1="140" y1="183" x2="168" y2="183" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Legend -->
  <text x="30" y="340" font-size="10" fill="#64748b">Solid = primary pipeline | Dashed = feeds into composition | All processing happens in the API before data reaches the dashboard</text>
</svg>
