<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <title>Clear Skies Data Flow</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="8" fill="url(#bgGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Clear Skies — Data Flow</text>

  <!-- Weather Station -->
  <rect x="30" y="60" width="130" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="88" text-anchor="middle" font-weight="600" fill="#1e40af">Weather</text>
  <text x="95" y="106" text-anchor="middle" font-weight="600" fill="#1e40af">Station</text>

  <!-- weewx -->
  <rect x="30" y="170" width="130" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="95" y="195" text-anchor="middle" font-weight="600" fill="#92400e">weewx</text>
  <text x="95" y="212" text-anchor="middle" font-size="11" fill="#92400e">Engine</text>
  <text x="95" y="228" text-anchor="middle" font-size="10" fill="#a16207">Archive DB</text>

  <!-- Arrow: Station → weewx -->
  <line x1="95" y1="130" x2="95" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="102" y="154" font-size="10" fill="#64748b">hardware</text>

  <!-- Loop Relay -->
  <rect x="200" y="170" width="130" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="265" y="195" text-anchor="middle" font-weight="600" fill="#92400e">Loop Relay</text>
  <text x="265" y="212" text-anchor="middle" font-size="11" fill="#92400e">Extension</text>
  <text x="265" y="228" text-anchor="middle" font-size="10" fill="#a16207">Unix socket</text>

  <!-- Arrow: weewx → Loop Relay -->
  <line x1="160" y1="205" x2="198" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="179" y="198" font-size="10" fill="#64748b">loop</text>

  <!-- API -->
  <rect x="380" y="140" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="168" text-anchor="middle" font-weight="600" fill="#166534">Clear Skies API</text>
  <text x="460" y="186" text-anchor="middle" font-size="11" fill="#166534">Unit conversion</text>
  <text x="460" y="202" text-anchor="middle" font-size="11" fill="#166534">Enrichment pipeline</text>
  <text x="460" y="218" text-anchor="middle" font-size="11" fill="#166534">REST + SSE</text>
  <text x="460" y="234" text-anchor="middle" font-size="10" fill="#15803d">Port 8765</text>

  <!-- Arrow: Loop Relay → API (real-time) -->
  <line x1="330" y1="195" x2="378" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="354" y="188" font-size="10" fill="#64748b">socket</text>

  <!-- Arrow: weewx DB → API (archive) -->
  <path d="M 95 240 Q 95 310 380 220" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="200" y="290" font-size="10" fill="#64748b">archive queries (SQL)</text>

  <!-- Providers -->
  <rect x="380" y="290" width="160" height="55" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="460" y="314" text-anchor="middle" font-weight="600" fill="#6b21a8">Data Providers</text>
  <text x="460" y="332" text-anchor="middle" font-size="10" fill="#7e22ce">Forecast, AQI, Alerts, Radar</text>

  <!-- Arrow: Providers → API -->
  <line x1="460" y1="290" x2="460" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="467" y="270" font-size="10" fill="#64748b">HTTP</text>

  <!-- Redis -->
  <rect x="380" y="60" width="100" height="45" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="430" y="82" text-anchor="middle" font-weight="600" fill="#991b1b">Redis</text>
  <text x="430" y="96" text-anchor="middle" font-size="10" fill="#b91c1c">Cache</text>

  <!-- Arrow: API ↔ Redis -->
  <line x1="440" y1="140" x2="435" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Caddy -->
  <rect x="590" y="140" width="130" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="655" y="168" text-anchor="middle" font-weight="600" fill="#3730a3">Caddy</text>
  <text x="655" y="186" text-anchor="middle" font-size="11" fill="#3730a3">Reverse proxy</text>
  <text x="655" y="202" text-anchor="middle" font-size="11" fill="#3730a3">TLS termination</text>
  <text x="655" y="218" text-anchor="middle" font-size="11" fill="#3730a3">Static files</text>
  <text x="655" y="234" text-anchor="middle" font-size="10" fill="#4338ca">Ports 80 / 443</text>

  <!-- Arrow: API → Caddy -->
  <line x1="540" y1="190" x2="588" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550" y="183" font-size="10" fill="#64748b">TLS</text>

  <!-- Browser -->
  <rect x="590" y="290" width="130" height="55" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="655" y="314" text-anchor="middle" font-weight="600" fill="#134e4a">Visitor's</text>
  <text x="655" y="332" text-anchor="middle" font-weight="600" fill="#134e4a">Browser</text>

  <!-- Arrow: Caddy ↔ Browser -->
  <line x1="655" y1="240" x2="655" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="662" y="268" font-size="10" fill="#64748b">HTTPS</text>

  <!-- Config UI -->
  <rect x="590" y="60" width="130" height="45" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="655" y="82" text-anchor="middle" font-weight="600" fill="#86198f">Config UI</text>
  <text x="655" y="96" text-anchor="middle" font-size="10" fill="#a21caf">Wizard + Admin</text>

  <!-- Arrow: Config UI ↔ Caddy -->
  <line x1="655" y1="105" x2="655" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="40" y="375" font-size="10" fill="#64748b">Solid arrows = runtime data flow | Dashed arrow = database query</text>
</svg>
