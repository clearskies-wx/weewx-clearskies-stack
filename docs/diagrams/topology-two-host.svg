<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <title>Clear Skies — Two-Host Topology</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="800" height="380" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Two-Host Deployment Topology</text>

  <!-- weewx Host box -->
  <rect x="20" y="50" width="340" height="300" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="190" y="72" text-anchor="middle" font-weight="700" fill="#92400e" font-size="14">weewx host</text>

  <!-- weewx -->
  <rect x="40" y="90" width="140" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="116" text-anchor="middle" font-weight="600" fill="#92400e">weewx 5.x</text>
  <text x="110" y="134" text-anchor="middle" font-size="10" fill="#a16207">+ Loop Relay ext</text>

  <!-- DB -->
  <rect x="40" y="170" width="140" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="194" text-anchor="middle" font-weight="600" fill="#92400e">Archive DB</text>
  <text x="110" y="210" text-anchor="middle" font-size="10" fill="#a16207">SQLite / MariaDB</text>

  <!-- API -->
  <rect x="200" y="90" width="140" height="80" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="270" y="116" text-anchor="middle" font-weight="600" fill="#166534">API</text>
  <text x="270" y="134" text-anchor="middle" font-size="11" fill="#166534">Port 8765 (TLS)</text>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#166534">Health :8081 (lo)</text>

  <!-- Redis -->
  <rect x="200" y="190" width="140" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="270" y="215" text-anchor="middle" font-weight="600" fill="#991b1b">Redis :6379 (lo)</text>

  <!-- Arrows on weewx host -->
  <line x1="110" y1="150" x2="110" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="120" x2="198" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="189" y="113" font-size="9" fill="#64748b">socket</text>
  <line x1="200" y1="155" x2="160" y2="175" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="165" y="161" font-size="9" fill="#64748b">SQL</text>
  <line x1="270" y1="170" x2="270" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Front-end Host box -->
  <rect x="440" y="50" width="340" height="300" rx="10" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="610" y="72" text-anchor="middle" font-weight="700" fill="#3730a3" font-size="14">Front-end host</text>

  <!-- Caddy -->
  <rect x="480" y="90" width="140" height="80" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="550" y="116" text-anchor="middle" font-weight="600" fill="#3730a3">Caddy</text>
  <text x="550" y="134" text-anchor="middle" font-size="11" fill="#3730a3">Ports 80 / 443</text>
  <text x="550" y="150" text-anchor="middle" font-size="11" fill="#3730a3">TLS + proxy</text>

  <!-- Dashboard -->
  <rect x="640" y="90" width="120" height="50" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="700" y="112" text-anchor="middle" font-weight="600" fill="#134e4a">Dashboard</text>
  <text x="700" y="128" text-anchor="middle" font-size="10" fill="#0d9488">Static SPA</text>

  <!-- Config UI -->
  <rect x="480" y="190" width="140" height="50" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="550" y="212" text-anchor="middle" font-weight="600" fill="#86198f">Config UI</text>
  <text x="550" y="228" text-anchor="middle" font-size="10" fill="#a21caf">Port 9876</text>

  <!-- Arrows on front-end host -->
  <line x1="620" y1="115" x2="638" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="629" y="108" font-size="9" fill="#64748b">files</text>
  <line x1="550" y1="170" x2="550" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Network link -->
  <line x1="340" y1="130" x2="478" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="368" y="115" width="80" height="22" rx="4" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="408" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Network</text>

  <!-- Internet / Browser -->
  <rect x="540" y="280" width="140" height="50" rx="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="610" y="303" text-anchor="middle" font-weight="600" fill="#475569">Internet</text>
  <text x="610" y="319" text-anchor="middle" font-size="10" fill="#64748b">Visitors' browsers</text>

  <!-- Arrow: Internet → Caddy -->
  <line x1="580" y1="280" x2="555" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="558" y="235" font-size="10" fill="#64748b">HTTPS</text>

  <!-- Legend -->
  <text x="40" y="360" font-size="10" fill="#64748b">Solid = runtime connection | Dashed box = host boundary | Dashed line = DB query</text>
</svg>
