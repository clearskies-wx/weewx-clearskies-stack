<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>Sky Classification Decision Tree</title>
  <defs>
    <marker id="a4" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="700" height="520" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Sky Classification Decision Tree</text>

  <!-- Solar elevation gate -->
  <rect x="240" y="50" width="220" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="70" text-anchor="middle" font-weight="600" fill="#92400e">Solar elevation > 15°?</text>
  <text x="350" y="85" text-anchor="middle" font-size="10" fill="#a16207">(SZA guard)</text>

  <!-- No branch (night/twilight) -->
  <line x1="460" y1="73" x2="580" y2="73" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="520" y="66" font-size="11" fill="#dc2626" font-weight="600">No</text>
  <rect x="582" y="53" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="632" y="70" text-anchor="middle" font-size="11" fill="#475569">Fallback to</text>
  <text x="632" y="84" text-anchor="middle" font-size="11" fill="#475569">provider cloud %</text>

  <!-- Yes branch -->
  <line x1="350" y1="95" x2="350" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="360" y="114" font-size="11" fill="#16a34a" font-weight="600">Yes</text>

  <!-- Variability check -->
  <rect x="230" y="127" width="240" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="147" text-anchor="middle" font-weight="600" fill="#1e40af">Kv (variability) < 0.05?</text>
  <text x="350" y="162" text-anchor="middle" font-size="10" fill="#2563eb">Is the sky uniform or variable?</text>

  <!-- Left: Uniform sky -->
  <line x1="230" y1="150" x2="140" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="170" y="177" font-size="11" fill="#16a34a" font-weight="600">Yes — Uniform</text>

  <!-- Right: Variable sky -->
  <line x1="470" y1="150" x2="540" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="505" y="177" font-size="11" fill="#dc2626" font-weight="600">No — Variable</text>

  <!-- Uniform: Clearness check -->
  <rect x="30" y="212" width="220" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="232" text-anchor="middle" font-weight="600" fill="#1e40af">Km > clear threshold?</text>
  <text x="140" y="247" text-anchor="middle" font-size="10" fill="#2563eb">(dynamic, per solar elevation)</text>

  <!-- Variable: Clearness check -->
  <rect x="440" y="212" width="240" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="232" text-anchor="middle" font-weight="600" fill="#1e40af">Km > clear threshold?</text>
  <text x="560" y="247" text-anchor="middle" font-size="10" fill="#2563eb">(dynamic, per solar elevation)</text>

  <!-- Uniform + Clear labels -->
  <line x1="70" y1="257" x2="70" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="56" y="282" font-size="10" fill="#16a34a">Yes</text>

  <rect x="20" y="302" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="70" y="322" text-anchor="middle" font-weight="600" fill="#166534">Clear</text>

  <!-- Uniform + Moderate -->
  <line x1="140" y1="257" x2="140" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="148" y="282" font-size="10" fill="#64748b">Mid</text>

  <rect x="90" y="302" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="322" text-anchor="middle" font-weight="600" fill="#166534">Mostly Clear</text>

  <!-- Uniform + Cloudy labels -->
  <line x1="210" y1="257" x2="210" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="218" y="282" font-size="10" fill="#dc2626">No</text>

  <!-- Sub-branch for overcast levels -->
  <rect x="200" y="302" width="120" height="32" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="260" y="322" text-anchor="middle" font-weight="600" fill="#3730a3">Km level?</text>

  <line x1="220" y1="334" x2="180" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="130" y="372" width="100" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="180" y="392" text-anchor="middle" font-weight="600" fill="#92400e">Overcast</text>

  <line x1="260" y1="334" x2="260" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="235" y="372" width="50" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="392" text-anchor="middle" font-weight="600" fill="#92400e">Cloudy</text>

  <line x1="300" y1="334" x2="340" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="295" y="372" width="90" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="392" text-anchor="middle" font-weight="600" font-size="11" fill="#92400e">Heavy Ovrcst</text>

  <!-- Variable + Clear labels -->
  <line x1="490" y1="257" x2="490" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="498" y="282" font-size="10" fill="#16a34a">Yes</text>

  <!-- Cloud enhancement check -->
  <rect x="430" y="302" width="120" height="45" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="490" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#86198f">Kcs > 1.06?</text>
  <text x="490" y="337" text-anchor="middle" font-size="9" fill="#a21caf">Cloud enhancement</text>

  <line x1="490" y1="347" x2="490" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="430" y="382" width="120" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="402" text-anchor="middle" font-weight="600" fill="#166534">Partly Cloudy</text>

  <!-- Variable + Cloudy -->
  <line x1="630" y1="257" x2="630" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="638" y="282" font-size="10" fill="#dc2626">No</text>

  <rect x="570" y="302" width="120" height="32" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="630" y="322" text-anchor="middle" font-weight="600" fill="#3730a3">Mostly Cloudy</text>

  <!-- Labels summary -->
  <rect x="30" y="440" width="640" height="65" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="460" text-anchor="middle" font-weight="600" fill="#334155">Seven output labels</text>
  <text x="350" y="480" text-anchor="middle" font-size="11" fill="#64748b">Clear → Mostly Clear → Partly Cloudy → Mostly Cloudy → Cloudy → Overcast → Heavy Overcast</text>
  <text x="350" y="496" text-anchor="middle" font-size="10" fill="#94a3b8">5-minute temporal coherence filter applied to all labels to prevent rapid flickering</text>
</svg>
