<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="system-ui, -apple-system, sans-serif" font-size="11">
  <title>Clear Skies — Setup Wizard Step Flow</title>
  <defs>
    <marker id="a6" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="760" height="320" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="25" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Setup Wizard — Step Flow</text>

  <!-- Row 1 -->
  <rect x="20" y="50" width="88" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="64" y="71" text-anchor="middle" font-weight="600" fill="#1e40af">Language</text>
  <text x="64" y="85" text-anchor="middle" font-size="9" fill="#3b82f6">UI language</text>

  <line x1="108" y1="75" x2="125" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="127" y="50" width="88" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="171" y="71" text-anchor="middle" font-weight="600" fill="#166534">API</text>
  <text x="171" y="85" text-anchor="middle" font-size="9" fill="#15803d">Trust handshake</text>

  <line x1="215" y1="75" x2="232" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="234" y="50" width="88" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="278" y="71" text-anchor="middle" font-weight="600" fill="#475569">Import</text>
  <text x="278" y="85" text-anchor="middle" font-size="9" fill="#64748b">Belchertown</text>

  <line x1="322" y1="75" x2="339" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="341" y="50" width="88" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="385" y="71" text-anchor="middle" font-weight="600" fill="#92400e">EULA</text>
  <text x="385" y="85" text-anchor="middle" font-size="9" fill="#a16207">License terms</text>

  <line x1="429" y1="75" x2="446" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="448" y="50" width="88" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="492" y="71" text-anchor="middle" font-weight="600" fill="#1e40af">Database</text>
  <text x="492" y="85" text-anchor="middle" font-size="9" fill="#3b82f6">SQLite/MariaDB</text>

  <line x1="536" y1="75" x2="553" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="555" y="50" width="88" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="599" y="71" text-anchor="middle" font-weight="600" fill="#1e40af">Schema</text>
  <text x="599" y="85" text-anchor="middle" font-size="9" fill="#3b82f6">Column mapping</text>

  <line x1="643" y1="75" x2="660" y2="75" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="662" y="50" width="80" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="702" y="71" text-anchor="middle" font-weight="600" fill="#166534">Station</text>
  <text x="702" y="85" text-anchor="middle" font-size="9" fill="#15803d">Identity</text>

  <!-- Row 2 connector -->
  <line x1="702" y1="100" x2="702" y2="130" stroke="#555" stroke-width="1.2"/>
  <line x1="702" y1="130" x2="64" y2="130" stroke="#555" stroke-width="1.2"/>
  <line x1="64" y1="130" x2="64" y2="145" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <!-- Row 2 -->
  <rect x="20" y="147" width="88" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="64" y="168" text-anchor="middle" font-weight="600" fill="#1e40af">Units</text>
  <text x="64" y="182" text-anchor="middle" font-size="9" fill="#3b82f6">Display format</text>

  <line x1="108" y1="172" x2="125" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="127" y="147" width="88" height="50" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.2"/>
  <text x="171" y="168" text-anchor="middle" font-weight="600" fill="#86198f">Providers</text>
  <text x="171" y="182" text-anchor="middle" font-size="9" fill="#a21caf">API keys</text>

  <line x1="215" y1="172" x2="232" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="234" y="147" width="88" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="278" y="168" text-anchor="middle" font-weight="600" fill="#475569">Webcam</text>
  <text x="278" y="182" text-anchor="middle" font-size="9" fill="#64748b">Optional</text>

  <line x1="322" y1="172" x2="339" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="341" y="147" width="88" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="385" y="168" text-anchor="middle" font-weight="600" fill="#3730a3">Appearance</text>
  <text x="385" y="182" text-anchor="middle" font-size="9" fill="#4338ca">Colors, logos</text>

  <line x1="429" y1="172" x2="446" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="448" y="147" width="88" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="492" y="168" text-anchor="middle" font-weight="600" fill="#92400e">Privacy</text>
  <text x="492" y="182" text-anchor="middle" font-size="9" fill="#a16207">Legal, analytics</text>

  <line x1="536" y1="172" x2="553" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="555" y="147" width="88" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="599" y="168" text-anchor="middle" font-weight="600" fill="#475569">Features</text>
  <text x="599" y="182" text-anchor="middle" font-size="9" fill="#64748b">Settings</text>

  <line x1="643" y1="172" x2="660" y2="172" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="662" y="147" width="80" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="702" y="168" text-anchor="middle" font-weight="600" fill="#166534">TLS</text>
  <text x="702" y="182" text-anchor="middle" font-size="9" fill="#15803d">Certificates</text>

  <!-- Row 3 connector -->
  <line x1="702" y1="197" x2="702" y2="227" stroke="#555" stroke-width="1.2"/>
  <line x1="702" y1="227" x2="310" y2="227" stroke="#555" stroke-width="1.2"/>
  <line x1="310" y1="227" x2="310" y2="245" stroke="#555" stroke-width="1.2" marker-end="url(#a6)"/>

  <!-- Row 3 -->
  <rect x="234" y="247" width="150" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="309" y="268" text-anchor="middle" font-weight="600" fill="#92400e">Review + Apply</text>
  <text x="309" y="282" text-anchor="middle" font-size="9" fill="#a16207">Write config, restart API</text>

  <line x1="384" y1="272" x2="410" y2="272" stroke="#555" stroke-width="1.5" marker-end="url(#a6)"/>

  <rect x="412" y="247" width="130" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="477" y="268" text-anchor="middle" font-weight="700" font-size="13" fill="#166534">Complete!</text>
  <text x="477" y="284" text-anchor="middle" font-size="9" fill="#15803d">Dashboard ready</text>

  <!-- Help icon annotation -->
  <text x="600" y="280" font-size="10" fill="#64748b">Every step has a</text>
  <text x="600" y="293" font-size="10" fill="#64748b">help panel (? icon)</text>
</svg>
