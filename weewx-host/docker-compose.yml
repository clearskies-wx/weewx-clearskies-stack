name: clearskies-api

services:
  api:
    image: ghcr.io/inguy24/weewx-clearskies-api:${CLEARSKIES_VERSION:-0.1.0}
    build:
      context: ../../weewx-clearskies-api
    network_mode: host
    volumes:
      - ${CLEARSKIES_CONFIG_DIR:-./config}:/etc/weewx-clearskies:rw
      - ${WEEWX_CONF_PATH:-/etc/weewx/weewx.conf}:/etc/weewx/weewx.conf:ro
      - ${WEEWX_DB_PATH:-/var/lib/weewx/weewx.sdb}:/data/weewx.sdb:ro
      - clearskies-cache:/var/cache/weewx-clearskies
    env_file: ${CLEARSKIES_SECRETS_FILE:-./config/secrets.env}
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  clearskies-cache:
  redis-data:
