name: clearskies-frontend

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${CLEARSKIES_HTTP_PORT:-80}:80"
      - "${CLEARSKIES_HTTPS_PORT:-443}:443"
      - "${CLEARSKIES_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - dashboard-dist:/srv/dashboard:ro
      - ${CLEARSKIES_WWW_DIR:-/var/www/clearskies}:/var/www/clearskies:ro
    environment:
      - CLEARSKIES_DOMAIN=${CLEARSKIES_DOMAIN:-localhost}
      - CLEARSKIES_API_URL=${CLEARSKIES_API_URL}
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      dashboard:
        condition: service_completed_successfully
      config:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: ghcr.io/inguy24/weewx-clearskies-dashboard:${CLEARSKIES_VERSION:-0.1.0}
    build:
      context: ../../weewx-clearskies-dashboard
    volumes:
      - dashboard-dist:/dist
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"

  config:
    image: ghcr.io/inguy24/weewx-clearskies-config:${CLEARSKIES_VERSION:-0.1.0}
    build:
      context: ../..
      dockerfile: weewx-clearskies-stack/Dockerfile
    volumes:
      - ${CLEARSKIES_CONFIG_DIR:-./config}:/etc/weewx-clearskies
    env_file: ${CLEARSKIES_SECRETS_FILE:-./config/secrets.env}
    environment:
      - CLEARSKIES_API_URL=${CLEARSKIES_API_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9876/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  dashboard-dist:
