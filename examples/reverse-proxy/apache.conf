# Apache reverse proxy config for a native (pip-installed) Clear Skies deployment.
# Both clearskies-api (port 8765) and clearskies-realtime (port 8766) run as
# systemd services on the same host as Apache.
#
# Replace the placeholder paths and domain before use.

<VirtualHost *:80>
    ServerName weather.example.com
    Redirect permanent / https://weather.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName weather.example.com

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/weather.example.com.crt
    SSLCertificateKeyFile /etc/ssl/private/weather.example.com.key

    # Required for SSE and streaming API responses.
    ProxyRequests Off
    ProxyPreserveHost On

    # API — short timeout sufficient for REST endpoints.
    ProxyPass        /api/v1/  http://127.0.0.1:8765/api/v1/  flushpackets=on timeout=60
    ProxyPassReverse /api/v1/  http://127.0.0.1:8765/api/v1/

    # SSE — long timeout keeps the event stream open; keepalive prevents idle drops.
    ProxyPass        /sse  http://127.0.0.1:8766/sse  flushpackets=on timeout=3600 keepalive=on
    ProxyPassReverse /sse  http://127.0.0.1:8766/sse

    # SPA static files.
    Alias / /var/www/clearskies/
    <Directory /var/www/clearskies>
        Options -Indexes
        AllowOverride None
        Require all granted
        # SPA routing: let React Router handle paths that aren't real files.
        FallbackResource /index.html
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset Server
</VirtualHost>
