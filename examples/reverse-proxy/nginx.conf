# nginx reverse proxy config for a native (pip-installed) Clear Skies deployment.
# clearskies-api (port 8765) runs as a systemd service on the same host as nginx.
# /api/v1/* and /sse both route to the API — realtime/BFF is merged into the API
# as of ADR-058.
#
# Replace the placeholder paths and domain before use.

server {
    listen 80;
    server_name weather.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name weather.example.com;

    ssl_certificate     /etc/ssl/certs/weather.example.com.crt;
    ssl_certificate_key /etc/ssl/private/weather.example.com.key;

    # API — buffering disabled so partial JSON is flushed immediately.
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8765;
        proxy_buffering    off;
        proxy_read_timeout 60s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE — long timeout keeps event stream open; empty Connection header
    # prevents nginx from setting "Connection: close" which breaks SSE.
    location /sse {
        proxy_pass         http://127.0.0.1:8765;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_http_version 1.1;
    }

    # SPA static files with React Router fallback.
    location / {
        root      /var/www/clearskies;
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;
}
